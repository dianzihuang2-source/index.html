    <title>烤鸭笔记</title>
    <script>
(function () {
  function applyDeviceClass() {
    var root = document.documentElement;
    var ua = navigator.userAgent || "";
    var platform = navigator.platform || "";
    var touchPoints = navigator.maxTouchPoints || 0;
    var isIPadOS = platform === "MacIntel" && touchPoints > 1;
    var isAndroid = /Android/i.test(ua);
    var isDesktopOS = (/Windows NT|Macintosh|X11|Linux x86_64/i.test(ua) && !isIPadOS && !isAndroid);
    var coarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    var shortestSide = Math.min(screen.width || window.innerWidth, screen.height || window.innerHeight);
    var longestSide = Math.max(screen.width || window.innerWidth, screen.height || window.innerHeight);
    var tabletUA = /iPad|Tablet|PlayBook|Silk|Kindle|Android(?!.*Mobile)/i.test(ua) || isIPadOS;
    var phoneUA = /iPhone|iPod|Android.*Mobile|Windows Phone|BlackBerry|IEMobile|Opera Mini/i.test(ua) || (/Mobi/i.test(ua) && !tabletUA);
    var phoneSize = coarsePointer && !isDesktopOS && shortestSide < 600;
    var tabletSize = coarsePointer && !isDesktopOS && shortestSide >= 600 && longestSide <= 1366;
    var isPhone = !tabletUA && (phoneUA || phoneSize);
    var isTablet = !isPhone && (tabletUA || tabletSize);

    root.classList.toggle("is-mobile", isPhone);
    root.classList.toggle("is-tablet", isTablet);
    root.dataset.device = isPhone ? "mobile" : isTablet ? "tablet" : "desktop";
  }

  applyDeviceClass();
  window.addEventListener("resize", applyDeviceClass, { passive: true });
  window.addEventListener("orientationchange", applyDeviceClass, { passive: true });
})();
    </script>

:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-soft: rgba(255, 255, 255, 0.72);
  --text: #1d1d1f;
  --muted: #6e6e73;
  --border: rgba(0, 0, 0, 0.1);
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --green: #2f9f5b;
  --orange: #bf4800;
  --shadow: 0 22px 60px rgba(0, 0, 0, 0.08);
  --radius-lg: 28px;
  --radius-md: 18px;
  --page-x: clamp(16px, 2.4vw, 36px);
  color-scheme: light;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-width: 320px;
  overflow-x: hidden;
  background:
    radial-gradient(circle at 18% 8%, rgba(255, 255, 255, 0.95), transparent 26%),
    linear-gradient(180deg, #fbfbfd 0%, var(--bg) 44%, #eeeeef 100%);
  color: var(--text);
  line-height: 1.5;
}

button,
input {
  font: inherit;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

a {
  color: inherit;
  text-decoration: none;
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 30;
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;

  background: rgba(245, 245, 247, 0.82);
  backdrop-filter: saturate(180%) blur(18px);
}

.top-nav,
.top-nav a {

  cursor: zoom-in;
}

.avatar-lightbox {
  position: fixed;
  inset: 0;
  z-index: 100;
  padding: 24px;
  background: rgba(0, 0, 0, 0.42);
}

.avatar-card {
  position: fixed;
  top: 50%;
  left: 50%;
  width: min(72vw, 520px);
  max-height: 82vh;
  display: grid;
  gap: 10px;
  transform: translate(-50%, -50%) scale(0.96);
  animation: avatar-zoom 180ms ease forwards;
}

.avatar-card img {
  width: 100%;
  display: block;
  border: 6px solid rgba(255, 255, 255, 0.92);
  border-radius: 28px;
  box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
  object-fit: contain;
}

.avatar-contact {
  width: 100%;
  aspect-ratio: 3 / 1;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.42);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.34);
  color: #ffffff;
  font-size: clamp(18px, 4vw, 30px);
  font-weight: 800;
  text-align: center;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.36);
  backdrop-filter: saturate(180%) blur(16px);
  box-shadow: 0 18px 54px rgba(0, 0, 0, 0.2);
}

@keyframes avatar-zoom {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}

.top-nav {
  gap: 28px;
  color: #424245;
  font-size: 13px;
}

.top-nav a {
  min-height: 44px;
}

.top-nav a:hover {
  color: var(--blue);
}

main {
  width: 100%;
  margin: 0;
  padding: 54px var(--page-x) 88px;
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1.15fr) minmax(330px, 420px);
  gap: 36px;
  align-items: end;
  min-height: 360px;
  padding: 42px;
  border: 1px solid rgba(255, 255, 255, 0.86);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.58)),
    radial-gradient(circle at 80% 16%, rgba(0, 113, 227, 0.12), transparent 30%);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), var(--shadow);
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--orange);
  font-size: 13px;
  font-weight: 800;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  max-width: 820px;
  margin-bottom: 18px;
  font-size: clamp(42px, 7vw, 76px);
  line-height: 1.04;
  letter-spacing: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.subhead {
  max-width: 680px;
  margin-bottom: 0;
  color: var(--muted);
  font-size: 20px;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.hero-copy,
.link-card > div,
.link-card p {
  min-width: 0;
  max-width: 100%;
}

.site-search {
  width: min(520px, 100%);
  display: grid;
  gap: 8px;
  margin-bottom: 18px;
}

.search-control {
  min-height: 54px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 8px 8px 18px;
  border: 1px solid rgba(0, 113, 227, 0.18);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.06);
  transition: border-color 180ms ease, box-shadow 180ms ease;
}

.search-control:focus-within {
  border-color: rgba(0, 113, 227, 0.48);
  box-shadow: 0 18px 42px rgba(0, 113, 227, 0.16);
}

.search-control input {
  min-width: 0;
  flex: 1 1 auto;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font: inherit;
  font-size: 15px;
}

.search-control input::placeholder {
  color: #86868b;
}

.search-control button {
  min-height: 38px;
  flex: 0 0 auto;
  padding: 0 16px;
  border: 0;
  border-radius: 999px;
  background: var(--blue);
  color: #ffffff;
  cursor: pointer;
  font-weight: 800;
  transition: background-color 180ms ease, transform 180ms ease;
}

.search-control button:hover {
  background: var(--blue-hover);
  transform: scale(1.03);
}

.search-control button:active {
  transform: scale(0.98);
}

.search-status {
  min-height: 18px;
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.promo-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  width: min(700px, 100%);
  min-height: 104px;
  margin: 0 0 28px;
  padding: 20px 24px;
  border: 1px solid rgba(0, 113, 227, 0.18);
  border-radius: 24px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(233, 244, 255, 0.82)),
    radial-gradient(circle at 12% 20%, rgba(0, 113, 227, 0.18), transparent 32%);
  box-shadow: 0 18px 44px rgba(0, 113, 227, 0.1);
  transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}

.promo-banner:hover {
  border-color: rgba(0, 113, 227, 0.34);
  box-shadow: 0 22px 52px rgba(0, 113, 227, 0.16);
  transform: translateY(-2px);
}

.promo-banner strong {
  display: block;
  margin-bottom: 4px;
  font-size: clamp(20px, 2.4vw, 30px);
  line-height: 1.15;
}

.promo-banner span {
  color: var(--muted);
  font-size: 14px;
}

.promo-banner em {
  flex: 0 0 auto;
  min-width: 92px;
  padding: 11px 16px;
  border-radius: 999px;
  background: var(--blue);
  color: #ffffff;
  font-size: 14px;
  font-style: normal;
  font-weight: 800;
  text-align: center;
}

.hero-panel {
  min-width: 0;
  display: grid;
  gap: 18px;
  padding: 18px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.76);
  backdrop-filter: saturate(180%) blur(18px);
}

.hero-photo {
  width: 100%;
  aspect-ratio: 16 / 10;
  margin: 0;
  overflow: hidden;
  border-radius: 20px;
  background: #f5f5f7;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
  cursor: zoom-in;
}

.hero-photo img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  transition: transform 0.24s ease;
}

.hero-photo:hover img,
.hero-photo:focus-visible img {
  transform: scale(1.025);
}

.hero-photo:focus-visible {
  outline: 3px solid rgba(0, 113, 227, 0.32);
  outline-offset: 4px;
}

.photo-lightbox {
  position: fixed;
  inset: 0;
  z-index: 130;
  display: grid;
  place-items: center;
  padding: 28px;
  background: rgba(20, 20, 22, 0.72);
  backdrop-filter: blur(18px);
}

.photo-gallery {
  width: min(1040px, 94vw);
  display: grid;
  gap: 14px;
}

.photo-stage {
  position: relative;
  display: grid;
  place-items: center;
  min-height: 0;
}

.photo-stage img {
  width: auto;
  max-width: 100%;
  max-height: calc(100vh - 190px);
  display: block;
  object-fit: contain;
  border-radius: 22px;
  background: #f5f5f7;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
}

.photo-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 40px;
  height: 40px;
  border: 0;
  border-radius: 50%;
  color: #1d1d1f;
  background: rgba(255, 255, 255, 0.82);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
  cursor: pointer;
  font-size: 24px;
  line-height: 1;
}

.photo-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  max-height: 156px;
  overflow: auto;
  padding: 10px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: saturate(180%) blur(16px);
}

.photo-thumb {
  width: 78px;
  height: 58px;
  padding: 0;
  overflow: hidden;
  border: 2px solid transparent;
  border-radius: 12px;
  background: #f5f5f7;
  cursor: pointer;
  opacity: 0.72;
}

.photo-thumb img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.photo-thumb.is-active {
  border-color: #0071e3;
  opacity: 1;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.stats-row div {
  min-height: 96px;
  padding: 18px;
  border-radius: 18px;
  background: #f5f5f7;
}

.stats-row strong {
  display: block;
  font-size: 34px;
  line-height: 1;
}

.stats-row span {
  color: var(--muted);
  font-size: 13px;
}

.tool-section,
.tips-section {
  margin-top: 34px;
}

.content-layout {
  display: block;
  margin-top: 34px;
}

.tool-section {
  min-width: 0;
  margin-top: 0;
}

.section-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 16px;
}

.section-heading h2,
.tips-section h2 {
  margin-bottom: 0;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.12;
  letter-spacing: 0;
}

.link-card,
.tips-section {
  min-width: 0;
  border: 1px solid rgba(0, 0, 0, 0.08);
  background: var(--surface-soft);
  backdrop-filter: saturate(180%) blur(18px);
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.05);
}

.link-card:hover {
  border-color: rgba(0, 113, 227, 0.34);
  box-shadow: 0 22px 54px rgba(0, 0, 0, 0.08);
  transform: translateY(-2px);
}

.link-card.is-highlighted {
  border-color: rgba(0, 113, 227, 0.62);
  box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14), 0 24px 60px rgba(0, 113, 227, 0.18);
  animation: card-highlight 1200ms ease 1;
}

@keyframes card-highlight {
  0%,
  100% {
    transform: translateY(0);
  }

  45% {
    transform: translateY(-4px);
  }
}

@media (prefers-reduced-motion: reduce) {
  .link-card.is-highlighted {
    animation: none;
  }
}

.app-icon {
  width: 68px;
  height: 68px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  border-radius: 18px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  background: #ffffff;
  color: #ffffff;
  font-size: 21px;
  font-weight: 800;
  overflow: hidden;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
}

.app-icon img {
  width: 70%;
  height: 70%;
  object-fit: contain;
}

.app-icon-fallback {
  display: none;
}

.app-icon.is-fallback {
  border: 0;
  background: var(--icon-bg, linear-gradient(135deg, #2d7ff9, #66d1ff));
}

function domainFromUrl(url) {
  return new URL(url).hostname.replace(/^www\./, "");
}

function faviconFromUrl(url) {
  return `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(url)}&size=64`;
}

function normalizeSearchText(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/^https?:\/\//, "")
    .replace(/^www\./, "")
    .replace(/\s+/g, "");
}

function searchableText(link) {
  return [
    link.name,
    domainFromUrl(link.url),
    link.url,
    link.description,
    link.strength,
    link.weakness,
    link.categoryLabel,
    link.initials,
  ].join(" ");
}

function findBestLink(query) {
  const normalizedQuery = normalizeSearchText(query);
  if (!normalizedQuery) return null;

  return officialLinks
    .map((link) => {
      const name = normalizeSearchText(link.name);
      const domain = normalizeSearchText(domainFromUrl(link.url));
      const fullText = normalizeSearchText(searchableText(link));
      let score = 0;

      if (name === normalizedQuery || domain === normalizedQuery) score = 100;
      else if (name.startsWith(normalizedQuery) || domain.startsWith(normalizedQuery)) score = 80;
      else if (name.includes(normalizedQuery) || domain.includes(normalizedQuery)) score = 60;
      else if (fullText.includes(normalizedQuery)) score = 30;

      return { link, score };
    })
    .filter((item) => item.score > 0)
    .sort((a, b) => b.score - a.score)[0]?.link || null;
}

function setActiveFilter(category) {
  activeFilter = category;
  filterButtons.forEach((item) => {
    const isActive = item.dataset.filter === category;
    item.classList.toggle("is-active", isActive);
    item.setAttribute("aria-selected", String(isActive));
  });
}

function createActions(link) {
  return `
    <div class="card-actions">
      <a class="open-link" href="${link.url}" target="_blank" rel="noopener noreferrer" aria-label="打开 ${link.name} 官网">打开官网</a>
      <button class="copy-button" type="button" data-copy="${link.url}" aria-label="复制 ${link.name} 官网链接">复制链接</button>
    </div>
  `;
}

function createIcon(link) {
  const iconUrl = link.iconUrl || faviconFromUrl(link.url);
  return `
    <span class="app-icon" style="--icon-bg: ${link.color}" aria-hidden="true">
      <img src="${iconUrl}" alt="" loading="lazy" onerror="this.parentElement.classList.add('is-fallback'); this.remove();">
      <span class="app-icon-fallback">${link.initials}</span>
    </span>
  `;
}

function createAiProfile(link) {
  if (!link.strength && !link.weakness) {
    return "";
  }

  return `
    <dl class="ai-profile">
      <div>
        <dt>优势</dt>
        <dd>${link.strength}</dd>
      </div>
      <div>
        <dt>缺点</dt>
        <dd>${link.weakness}</dd>
      </div>
    </dl>
  `;
}

function renderCards() {
  const filtered = officialLinks.filter((link) => {
    const matchesCategory = link.category === activeFilter;
    return matchesCategory;
  });

  cardGrid.innerHTML = filtered
    .map(
      (link) => `
        <article class="link-card${link.name === activeHighlightName ? " is-highlighted" : ""}" data-link-key="${encodeURIComponent(link.name)}">
          <div class="card-top">
            ${createIcon(link)}
            <div>
              <h3>${link.name}</h3>
              <span class="domain">${domainFromUrl(link.url)}</span>
            </div>
          </div>
          <p>${link.description}</p>
          ${createAiProfile(link)}
          ${createActions(link)}
          <div class="tag-row">
            <span class="tag official">官方入口</span>
            <span class="tag">${categoryNames[link.category]}</span>
          </div>
        </article>
      `,
    )
    .join("");

  emptyState.hidden = filtered.length > 0;
}

function focusHighlightedCard(linkName) {
  window.requestAnimationFrame(() => {
    const card = cardGrid.querySelector(`[data-link-key="${encodeURIComponent(linkName)}"]`);
    if (!card) return;
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  });
}

function searchSite(query) {
  const match = findBestLink(query);
  if (!match) {
    activeHighlightName = "";
    searchStatus.textContent = "没有找到匹配的网址入口。";
    showToast("没有找到匹配的网址");
    return;
  }

  activeHighlightName = match.name;
  setActiveFilter(match.category);
  renderCards();
  searchStatus.textContent = `已定位：${match.name}（${categoryNames[match.category]}）`;
  showToast(`已定位 ${match.name}`);
  focusHighlightedCard(match.name);
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("is-visible");
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => {
    toast.classList.remove("is-visible");
  }, 1800);
}

async function copyToClipboard(url) {
  try {
    await navigator.clipboard.writeText(url);
    showToast("链接已复制");
  } catch {
    showToast(url);
  }
}

  const stageImage = photoLightbox.querySelector(".photo-stage img");
  stageImage.src = current.src;
  stageImage.alt = current.alt;
  photoLightbox.querySelectorAll(".photo-thumb").forEach((button) => {
    button.classList.toggle("is-active", Number(button.dataset.photoIndex) === index);

  closePhotoLightbox();
  photoLightbox = document.createElement("div");
  photoLightbox.className = "photo-lightbox";
  photoLightbox.innerHTML = `

          <button class="photo-thumb" type="button" data-photo-index="${photoIndex}" aria-label="查看第 ${photoIndex + 1} 张照片">
            <img src="${photo.src}" alt="">
          </button>
        `).join("")}
      </div>
    </div>
  `;
  document.body.append(photoLightbox);
  setActivePhoto(index);
}

document.addEventListener("click", (event) => {

});

document.addEventListener("click", (event) => {
  if (event.target === avatarLightbox) {
    closeAvatarLightbox();
  }
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    closePhotoLightbox();
    closeAvatarLightbox();
  }
});

filterButtons.forEach((button) => {
  button.addEventListener("click", () => {
    activeHighlightName = "";
    searchStatus.textContent = "";
    setActiveFilter(button.dataset.filter);
    renderCards();
  });
});

searchForm.addEventListener("submit", (event) => {
  event.preventDefault();
  searchSite(searchInput.value);
});

searchInput.addEventListener("input", () => {
  if (!searchInput.value.trim()) {
    activeHighlightName = "";
    searchStatus.textContent = "";
    renderCards();
  }
});

totalCount.textContent = officialLinks.length;
categoryCount.textContent = new Set(officialLinks.map((link) => link.category)).size;
renderCards();
